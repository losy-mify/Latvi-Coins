name: Latvi-Coins

on:
  workflow_dispatch:
  repository_dispatch:
    types: [cron-trigger]
  schedule:
    - cron: '0 0 * * *'  # 北京时间 08:00 (UTC+8)
    
jobs:
  run_latvi_coins:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Latvi-Coins-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          
      - name: 📂 移动脚本到工作目录
        run: mv private/latvi_coins.py latvi_coins.py
        
      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\([0-9]*\.[0-9]*\.\)[0-9]*\.[0-9]*/\1**.**/g'
     
      - name: 🐍 安装 Python 依赖
        run: |
          pip install requests

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          LATVI_ACCOUNT: ${{ secrets.LATVI_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.CRON_JOB }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          python latvi_coins.py
  
      - name: 💾 保存状态回私库
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          cd private
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/Latvi-Coins-Private.git
          git add lv_state_*.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: 自动更新设备标识状态文件 [skip ci]"
            git push
            echo "✅ 状态文件已成功推送到私有仓库"
          else
            echo "ℹ️ 状态文件无变化，无需推送"
          fi
